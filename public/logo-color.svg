      <line x1="27" y1="16" x2="32" y2="16" stroke="url(#gg)" stroke-width="2.8" stroke-linecap="round"/>
      <line x1="4.3" y1="4.3" x2="8" y2="8" stroke="url(#gg)" stroke-width="2.4" stroke-linecap="round"/>
      <line x1="24" y1="24" x2="27.7" y2="27.7" stroke="url(#gg)" stroke-width="2.4" stroke-linecap="round"/>
